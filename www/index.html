<html lang="fr">
<head>
  <meta charset="utf-8" />

  <meta name="description" content="Chevet — le compagnon de révision des étudiants infirmiers : 3 années d'IFSI, fiches, QCM, flashcards, calculs de doses, cas cliniques et mémoire (TFE). 100% hors-ligne." />

  <!-- Favicon / icônes -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="panel-root" class="app-root" role="main"></main>
  <nav id="bottom-nav" class="bottom-nav" aria-label="Navigation principale"></nav>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root"></div>
  <script type="module" src="js/app.js"></script>
  <script>
    // Service worker : hors-ligne + notifications de mise à jour
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          reg.addEventListener("updatefound", () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener("statechange", () => {
              if (newSW.state === "installed" && navigator.serviceWorker.controller) {
                window.dispatchEvent(new CustomEvent("sw-update-available", { detail: { sw: newSW } }));
              }
            });
          });
        }).catch(err => console.warn("[sw] échec d'enregistrement:", err));
      });
    }
  </script>
</body>
</html>
